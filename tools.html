<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Barat Ali | Rigging Development Tools</title>
  <meta name="description" content="Rigging development tools with playable GIF and MP4 slider content.">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="site-header">
    <div class="container navbar">
      <a class="brand" href="index.html"><img src="Logo/whilteLogo.png" alt="Barat Ali logo"></a>
      <nav class="nav-links" aria-label="Primary navigation">
        <a href="index.html">Home</a>
        <a href="about.html">About Me</a>
        <a class="active" href="tools.html">Rigging Development Tools</a>
        <a href="contact.html">Contact</a>
      </nav>
    </div>
  </header>

  <main class="simple-tools">
    <section class="simple-tools-section">
      <div class="container simple-tools-container">
        <div class="simple-page-title">
          <p class="eyebrow">Rigging Development Tools</p>
          <h1>Tool demos</h1>
        </div>

        <div class="simple-tools-slider-shell">
          <div id="tools-slider" class="simple-tools-slider" aria-live="polite"></div>

          <div class="simple-tools-controls">
            <button id="slider-prev" class="simple-home-nav-btn" type="button" aria-label="Previous tool">&#10094;</button>
            <button id="slider-next" class="simple-home-nav-btn" type="button" aria-label="Next tool">&#10095;</button>
          </div>

          <div id="slider-dots" class="simple-hidden-dots"></div>
          <div id="tools-thumbs" class="simple-hidden-dots"></div>
        </div>

        <p class="note simple-tools-note">Use <strong>tools.json</strong> to add GIF, MP4, or image files.</p>
      </div>
    </section>
  </main>

  <footer class="site-footer">
